# yaml-language-server: $schema=https://nfpm.goreleaser.com/schema.json
name: pacman
arch: ${NFPM_ARCH}
platform: linux
version: ${RPM_VERSION}
version_schema: none
release: ${RPM_RELEASE}
section: database
priority: optional
maintainer: PACMAN Maintainers <maintainers@pacman.local>
vendor: PACMAN
homepage: https://github.com/polkiloo/pacman
license: Apache-2.0
description: |-
  PACMAN is a PostgreSQL HA control plane that provides process-mode node
  agents, cluster coordination, failover, switchover, and explicit rejoin
  workflows.
depends:
  - systemd
rpm:
  group: Applications/Databases
  compression: gzip
contents:
  - src: build/nfpm/pacman/usr/bin/pacmand
    dst: /usr/bin/pacmand
    file_info:
      mode: 0755
  - src: build/nfpm/pacman/usr/bin/pacmanctl
    dst: /usr/bin/pacmanctl
    file_info:
      mode: 0755
  - src: packaging/rpm/systemd/pacmand.service
    dst: /usr/lib/systemd/system/pacmand.service
    file_info:
      mode: 0644
  - src: packaging/rpm/sysconfig/pacmand
    dst: /etc/sysconfig/pacmand
    type: config|noreplace
    file_info:
      mode: 0644
  - src: packaging/rpm/config/pacmand.yaml
    dst: /etc/pacman/pacmand.yaml
    type: config|noreplace
    file_info:
      mode: 0644
  - src: packaging/rpm/tmpfiles/pacman.conf
    dst: /usr/lib/tmpfiles.d/pacman.conf
    file_info:
      mode: 0644
  - dst: /etc/pacman/admin-token
    type: ghost
    file_info:
      mode: 0640
      owner: root
      group: pacman
  - dst: /var/lib/pacman
    type: dir
    file_info:
      mode: 0750
      owner: pacman
      group: pacman
  - dst: /var/lib/pacman/raft
    type: dir
    file_info:
      mode: 0750
      owner: pacman
      group: pacman
  - dst: /var/log/pacman
    type: dir
    file_info:
      mode: 0750
      owner: pacman
      group: pacman
scripts:
  preinstall: packaging/nfpm/scripts/pacman-preinstall.sh
  postinstall: packaging/nfpm/scripts/pacman-postinstall.sh
  preremove: packaging/nfpm/scripts/pacman-preremove.sh
  postremove: packaging/nfpm/scripts/pacman-postremove.sh
