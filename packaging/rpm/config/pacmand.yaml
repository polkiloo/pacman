apiVersion: pacman.io/v1alpha1
kind: NodeConfig

node:
  name: pacman-node-1
  role: data
  apiAddress: 0.0.0.0:8080
  controlAddress: 127.0.0.1:9090

dcs:
  backend: etcd
  clusterName: pacman-demo
  ttl: 30s
  retryTimeout: 10s
  etcd:
    endpoints:
      - http://127.0.0.1:2379

security:
  adminBearerTokenFile: /etc/pacman/admin-token

postgres:
  dataDir: /var/lib/pgsql/17/data
  binDir: /usr/pgsql-17/bin
  listenAddress: 127.0.0.1
  port: 5432

bootstrap:
  clusterName: pacman-demo
  initialPrimary: pacman-node-1
  seedAddresses:
    - 127.0.0.1:9090
  expectedMembers:
    - pacman-node-1
