---
pacman_cluster_name: alpha
pacman_initial_primary: alpha-1
pacman_initial_primary_host: "{{ pacman_initial_primary }}"

pacman_package_name: pacman
pacman_package_url: ""
pacman_download_path: /var/tmp/pacman.rpm
pacman_api_port: 8080
pacman_control_port: 9090

pacman_tls_enabled: false
pacman_tls_dir: /etc/pacman/tls
pacman_tls_ca_src: ""
pacman_tls_cert_src: ""
pacman_tls_key_src: ""
pacman_tls_ca_path: "{{ pacman_tls_dir }}/ca.crt"
pacman_tls_cert_path: "{{ pacman_tls_dir }}/node.crt"
pacman_tls_key_path: "{{ pacman_tls_dir }}/node.key"
pacman_tls_server_name: ""
pacman_tls_insecure_skip_verify: false
pacman_security_member_mtls_enabled: false

pacman_admin_token_path: /etc/pacman/admin-token
pacman_admin_token_inline: change-me-before-production
pacman_admin_token_source_files: []
pacman_admin_token_active_id: current

postgres_server_package_name: postgresql17-server
postgres_client_package_name: postgresql17
postgres_service_name: postgresql-17
postgres_initdb_command: /usr/pgsql-17/bin/postgresql-17-setup initdb
postgres_bin_dir: /usr/pgsql-17/bin
postgres_data_dir: /var/lib/pgsql/17/data
postgres_port: 5432
postgres_listen_address: 127.0.0.1
postgres_server_listen_addresses: "*"
postgres_os_user: postgres
postgres_os_group: postgres
postgres_manage_replication: true
postgres_replication_user: replicator
postgres_replication_password: replicator
postgres_replication_hba_cidrs:
  - 0.0.0.0/0
postgres_replication_force_reclone: false
postgres_max_wal_senders: 10
postgres_max_replication_slots: 10
postgres_wal_keep_size: 512MB
postgres_extra_parameters: {}

etcd_package_name: etcd
etcd_service_name: etcd
etcd_binary_path: /usr/bin/etcd
etcd_user: etcd
etcd_group: etcd
etcd_data_dir: /var/lib/etcd/pacman
etcd_client_port: 2379
etcd_peer_port: 2380
etcd_initial_cluster_state: new
etcd_initial_cluster_token: pacman-cluster

pacmand_service_name: pacmand
pacmand_binary_path: /usr/bin/pacmand
pacmand_service_user: postgres
pacmand_service_group: postgres
pacmand_config_dir: /etc/pacman
pacmand_config_path: /etc/pacman/pacmand.yaml
pacmand_state_dir: /var/lib/pacman
pacmand_token_dir: "{{ pacmand_config_dir }}/tokens"

vip_manager_enabled: false
vip_manager_version: 3.0.0
vip_manager_package_url: ""
vip_manager_download_path: /var/tmp/vip-manager.tar.gz
vip_manager_extract_dir: /var/tmp/vip-manager
vip_manager_binary_path: /usr/local/bin/vip-manager
vip_manager_config_dir: /etc/pacman
vip_manager_config_path: /etc/pacman/vip-manager.yml
vip_manager_service_name: vip-manager
vip_manager_manage_service: true
vip_manager_user: root
vip_manager_group: root
vip_manager_ip: ""
vip_manager_netmask: 24
vip_manager_interface: eth0
vip_manager_interval_ms: 1000
vip_manager_verbose: false
vip_manager_dcs_type: patroni
vip_manager_dcs_endpoints:
  - "http://{{ pacman_api_address | default((ansible_host | default(ansible_default_ipv4.address | default(inventory_hostname))) ~ ':' ~ pacman_api_port) }}"
vip_manager_trigger_path: /primary
vip_manager_trigger_status_code: 200
