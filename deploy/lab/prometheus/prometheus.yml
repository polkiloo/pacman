global:
  scrape_interval: 2s
  evaluation_interval: 2s

scrape_configs:
  - job_name: pacman
    metrics_path: /metrics
    static_configs:
      - targets:
          - pacman-primary:8080
        labels:
          node: alpha-1
          member: alpha-1
          role: postgres
          service: pacman-primary
      - targets:
          - pacman-replica:8080
        labels:
          node: alpha-2
          member: alpha-2
          role: postgres
          service: pacman-replica

  - job_name: node-exporter
    static_configs:
      - targets:
          - pacman-dcs:9100
        labels:
          node: alpha-dcs
          member: alpha-dcs
          role: dcs
          service: pacman-dcs
      - targets:
          - pacman-primary:9100
        labels:
          node: alpha-1
          member: alpha-1
          role: postgres
          service: pacman-primary
      - targets:
          - pacman-replica:9100
        labels:
          node: alpha-2
          member: alpha-2
          role: postgres
          service: pacman-replica

  - job_name: etcd
    metrics_path: /metrics
    static_configs:
      - targets:
          - pacman-dcs:2379
        labels:
          node: alpha-dcs
          member: alpha-dcs
          role: dcs
          service: pacman-dcs
