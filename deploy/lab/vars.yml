---
pacman_manage_service: false
postgres_manage_service: false
etcd_manage_service: false
vip_manager_manage_service: false

pacman_admin_token_inline: lab-admin-token
postgres_superuser_password: pacman-demo-password
pacmand_environment:
  PGPASSWORD: pacman-demo-password
pacman_reinit_walg_enabled: true
pacman_reinit_walg_binary: /usr/local/bin/pacman-lab-wal-g
pacman_reinit_walg_repository_provider: filesystem
pacman_reinit_walg_repository_prefix: /var/lib/pacman/walg
pacman_reinit_walg_restore_backup_name: LATEST
pacman_reinit_walg_environment_file_values:
  PACMAN_LAB_REINIT_PRIMARY_HOST: 172.28.0.100
  PACMAN_LAB_REINIT_PRIMARY_PORT: "5432"
  PACMAN_LAB_REINIT_REPLICATION_USER: replicator
etcd_user: root
etcd_group: root
vip_manager_enabled: true
vip_manager_ip: 172.28.0.100
vip_manager_interface: eth0
vip_manager_verbose: true
