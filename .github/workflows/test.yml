name: test

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  test:
    runs-on:
      - self-hosted
      - linux
      - x64
      - centos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache: true

      - name: Enforce coverage threshold
        run: make coverage-check
