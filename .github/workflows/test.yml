name: test

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  test-dcs-conformance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache: true

      - name: Run DCS conformance suite
        run: make test-dcs-conformance

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache: true

      - name: Enforce coverage threshold
        run: make coverage-check

  test-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache: true

      - name: Build integration images
        run: make docker-build-test-image docker-build-pgext-image docker-build-ansible-install-image

      - name: Run integration smoke suite
        run: make test-integration-smoke

      - name: Run integration security suite
        run: make test-integration-security

      - name: Run integration Patroni suite
        run: make test-integration-patroni

      - name: Run integration PostgreSQL extension suite
        run: make test-integration-pgext

      - name: Run integration HA suite
        run: make test-integration-ha

      - name: Run integration install suite
        run: make test-integration-install

  test-rpm-packaging:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate RPM install lifecycle
        run: make rpm-validate

  test-ansible-deployment:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Ansible
        run: python -m pip install --upgrade pip ansible-core

      - name: Validate Ansible deployment automation
        run: make ansible-validate
