name: test

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  test-dcs-conformance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache: true

      - name: Run DCS conformance suite
        run: make test-dcs-conformance

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache: true

      - name: Enforce coverage threshold
        run: make coverage-check

  test-integration:
    name: integration / ${{ matrix.suite }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: control-plane
            target: test-integration-control-plane
          - suite: patroni
            target: test-integration-patroni
          - suite: postgres
            target: test-integration-postgres
          - suite: ha
            target: test-integration-ha
          - suite: install
            target: test-integration-install

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache: true

      - name: Run integration suite
        run: make ${{ matrix.target }}

  test-rpm-packaging:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate RPM install lifecycle
        run: make rpm-validate

  test-ansible-deployment:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Ansible
        run: python -m pip install --upgrade pip ansible-core

      - name: Validate Ansible deployment automation
        run: make ansible-validate
