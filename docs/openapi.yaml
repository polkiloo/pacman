openapi: 3.1.0
info:
  title: PACMAN Control Plane API
  version: 0.1.0
  description: |
    Draft OpenAPI contract for PACMAN.

    The API shape is informed by Patroni's REST API patterns for:
    - node health and probe endpoints,
    - cluster topology and history inspection,
    - manual switchover and failover operations.

    For migration, PACMAN exposes both:
    - Patroni-compatible top-level endpoints for probes, monitoring, and administrative flows,
    - cluster-centric `/api/v1/*` endpoints for PACMAN-native clients.

    This draft has been reviewed against the current PACMAN domain model and
    Patroni REST semantics. The accompanying review, migration notes,
    authentication model, and compatibility policy live in `docs/api-contract.md`.
servers:
  - url: http://localhost:8080
    description: Local development control-plane endpoint
tags:
  - name: Probes
    description: Lightweight node-local health and role probes
  - name: Patroni Compatibility
    description: Patroni-compatible top-level endpoints for seamless client migration
  - name: Monitoring
    description: Monitoring and metrics endpoints
  - name: Cluster
    description: Cluster topology, desired state, and history
  - name: Members
    description: Per-member and per-node status inspection
  - name: Maintenance
    description: Cluster-wide maintenance mode control
  - name: Diagnostics
    description: Control-plane diagnostics summaries
  - name: Operations
    description: Explicit topology-changing operations
