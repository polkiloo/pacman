# PostgreSQL background-worker bootstrap for PACMAN.
# This is the extension-mode equivalent of `pacmand -pgext-env`.

shared_preload_libraries = 'pacman_agent'

pacman.node_name = 'alpha-1'
pacman.node_role = 'data'
pacman.api_address = '10.0.0.11:8080'
pacman.control_address = '10.0.0.11:9090'
pacman.helper_path = '/usr/local/bin/pacmand'

pacman.postgres_data_dir = '/var/lib/postgresql/17/main'
pacman.postgres_bin_dir = '/usr/lib/postgresql/17/bin'
pacman.postgres_listen_address = '127.0.0.1'
pacman.postgres_port = 5432

pacman.cluster_name = 'alpha'
pacman.initial_primary = 'alpha-1'
pacman.seed_addresses = '10.0.0.11:9090,10.0.0.12:9090,10.0.0.13:9090'
pacman.expected_members = 'alpha-1,alpha-2,alpha-3'
