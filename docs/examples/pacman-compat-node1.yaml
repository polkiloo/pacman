# PACMAN config equivalent to Patroni postgres1.yml (first standby).
#
# Patroni original:
#   scope: batman
#   name: postgresql1
#   restapi.listen: 127.0.0.1:8009
#   etcd.host: 127.0.0.1:2379
#   postgresql.listen: 127.0.0.1:5433
#   postgresql.data_dir: data/postgresql1
#
# Unsupported Patroni fields dropped: bootstrap.initdb, bootstrap.dcs.loop_wait,
# bootstrap.dcs.maximum_lag_on_failover, postgresql.pgpass, postgresql.authentication,
# postgresql.basebackup, tags.  Patroni did not enable REST auth here, so PACMAN
# admin auth is also omitted in this compatibility example.

apiVersion: pacman.io/v1alpha1
kind: NodeConfig

node:
  name: postgresql1             # Patroni: name
  role: data
  apiAddress: 127.0.0.1:8009   # Patroni: restapi.listen
  controlAddress: 127.0.0.1:9009   # PACMAN-only peer/control-plane listener

dcs:
  backend: etcd
  clusterName: batman           # Patroni: scope
  ttl: 30s                      # Patroni: bootstrap.dcs.ttl
  retryTimeout: 10s             # Patroni: bootstrap.dcs.retry_timeout
  etcd:
    endpoints:
      - http://127.0.0.1:2379   # Patroni: etcd.host (scheme added)

postgres:
  dataDir: data/postgresql1     # Patroni: postgresql.data_dir
  binDir: /usr/lib/postgresql/17/bin   # Patroni: postgresql.bin_dir
  listenAddress: 127.0.0.1      # Patroni: postgresql.listen (host part)
  port: 5433                    # Patroni: postgresql.listen (port part)
  parameters:
    unix_socket_directories: ".."   # Patroni: postgresql.parameters

bootstrap:
  clusterName: batman
  initialPrimary: postgresql0   # Same as node0 — cluster is already bootstrapped
  seedAddresses:
    - 127.0.0.1:9008
    - 127.0.0.1:9009
    - 127.0.0.1:9010
  expectedMembers:
    - postgresql0
    - postgresql1
    - postgresql2
